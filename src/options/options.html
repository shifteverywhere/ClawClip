<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ClawClip – Endpoints</title>
  <link rel="stylesheet" href="options.css" />
</head>
<body>

  <div class="container">

    <header>
      <div>
        <h1>ClawClip <span class="subtitle">Endpoints</span></h1>
        <p class="tagline">Configure webhook destinations for your automation workflows.</p>
      </div>
      <button id="btn-theme" class="theme-toggle" aria-label="Toggle theme">
        <svg class="icon icon-moon" xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
        <svg class="icon icon-sun" xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      </button>
    </header>

    <!-- Add / Edit form (hidden until + Add or Edit is clicked) -->
    <section class="card" id="section-form" style="display:none">
      <h2 id="form-title">Add Endpoint</h2>
      <form id="endpoint-form" novalidate autocomplete="off">
        <input type="hidden" id="edit-id" />

        <div class="field">
          <label for="inp-name">Name</label>
          <input type="text" id="inp-name" placeholder="My Zapier Hook" required />
        </div>

        <div class="field">
          <label for="inp-url">
            Webhook URL
            <span class="badge-https">HTTPS required</span>
          </label>
          <input type="url" id="inp-url" placeholder="https://hooks.zapier.com/hooks/catch/…" required />
          <span class="field-error" id="url-error"></span>
        </div>

        <div class="field">
          <label for="inp-headers">
            Static Headers
            <span class="label-opt">(optional — JSON object)</span>
          </label>
          <textarea id="inp-headers" rows="3"
            placeholder='{"Authorization": "Bearer token", "X-Source": "clawclip"}'></textarea>
          <span class="field-error" id="headers-error"></span>
        </div>

        <div class="field">
          <label for="inp-tags">
            Default Tags
            <span class="label-opt">(optional — comma-separated)</span>
          </label>
          <input type="text" id="inp-tags" placeholder="ai, automation, research" />
        </div>

        <div id="form-feedback" class="form-feedback hidden"></div>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary" id="btn-save">Save Endpoint</button>
          <button type="button" class="btn btn-secondary" id="btn-cancel">Cancel</button>
        </div>
      </form>
    </section>

    <!-- Endpoint list -->
    <section class="card">
      <div class="section-header">
        <h2>Your Endpoints</h2>
        <button class="btn btn-primary btn-sm" id="btn-add">+ Add Endpoint</button>
      </div>
      <div id="endpoint-list"></div>
    </section>

  </div>

  <script type="module" src="options.js"></script>
</body>
</html>
